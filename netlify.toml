[build]
  publish = "."
  command = "cd wardrobe && npm install --include=dev 2>/dev/null; true"

[functions]
  directory    = "wardrobe/netlify/functions"
  node_bundler = "esbuild"

# ── Wardrobe app routes ────────────────────────────────────────────────────────
[[redirects]]
  from   = "/wardrobe"
  to     = "/wardrobe/index.html"
  status = 200

[[redirects]]
  from   = "/wardrobe/"
  to     = "/wardrobe/index.html"
  status = 200

# ── Trading Bot app routes ────────────────────────────────────────────────────
[[redirects]]
  from   = "/tradingbot"
  to     = "/tradingbot/index.html"
  status = 200

[[redirects]]
  from   = "/tradingbot/"
  to     = "/tradingbot/index.html"
  status = 200

# ── Existing site routes ───────────────────────────────────────────────────────
[[redirects]]
  from = "/solutions"
  to   = "/solutions/index.html"
  status = 200

[[redirects]]
  from = "/security"
  to   = "/security/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to   = "/about/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
