[[redirects]]
  from = "/solutions"
  to   = "/solutions/index.html"
  status = 200

[[redirects]]
  from = "/security"
  to   = "/security/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to   = "/about/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact/index.html"
  status = 200

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
